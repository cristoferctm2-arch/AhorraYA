<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Configuración para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AhorraYA">
    <!-- Asegúrate de que logo.png esté en la misma carpeta en GitHub -->
    <link rel="apple-touch-icon" href="logo.png">

    <title>AhorraYA</title>

    <!-- Recursos Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Módulos) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Exponer Firebase al contexto global para React
        window.FB = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot, 
            collection, addDoc, deleteDoc, getDocs, query 
        };
    </script>

    <style>
        :root { 
            --sat: env(safe-area-inset-top); 
            --sab: env(safe-area-inset-bottom); 
        }
        body { 
            background: linear-gradient(to bottom, #1a1b1e 0%, #0f0f11 100%);
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }
        /* Espaciado superior para evitar el Dynamic Island */
        .safe-top { padding-top: calc(var(--sat, 44px) + 18px); }
        .safe-bottom { padding-bottom: calc(var(--sab, 34px) + 20px); }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: 400ms cubic-bezier(0.4, 0, 0.2, 1) both; }
        
        ::-webkit-scrollbar { width: 0px; }
        .glass-header { background: rgba(26, 27, 30, 0.98); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Componente de Icono Robusto
        const Icon = ({ name, className }) => <i data-lucide={name} className={className}></i>;

        // Logo con colores fijos (Blanco) para evitar que se vea negro en iPhone
        const AhorraYALogo = ({ className }) => (
            <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="46" stroke="white" strokeWidth="5"/>
                <g transform="translate(42, 18) rotate(-10)">
                    <rect width="26" height="34" rx="2" fill="white" />
                    <circle cx="6" cy="6" r="3" fill="#1a1b1e" opacity="0.9" />
                    <circle cx="20" cy="28" r="3" fill="#1a1b1e" opacity="0.9" />
                    <circle cx="13" cy="17" r="5" fill="#1a1b1e" opacity="0.7" />
                </g>
                <rect x="24" y="44" width="52" height="38" rx="10" fill="white" />
                <rect x="29" y="44" width="42" height="3.5" rx="1.5" fill="#1a1b1e" />
            </svg>
        );

        const App = () => {
            const [view, setView] = useState('setup');
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showConfirmArchive, setShowConfirmArchive] = useState(false);
            const [deleteDialog, setDeleteDialog] = useState({ isOpen: false, type: null, id: null, title: '' });

            // Estados de Datos Sincronizados
            const [income, setIncome] = useState('');
            const [fixedExpenses, setFixedExpenses] = useState('');
            const [savingsTarget, setSavingsTarget] = useState('');
            const [expensesList, setExpensesList] = useState([]);
            const [habitualProducts, setHabitualProducts] = useState([]);
            const [historyList, setHistoryList] = useState([]);
            const [totalSavedOverall, setTotalSavedOverall] = useState(0);

            // Estados Temporales
            const [tempHabitName, setTempHabitName] = useState('');
            const [tempHabitAmount, setTempHabitAmount] = useState('');
            const [tempExpName, setTempExpName] = useState('');
            const [tempExpAmount, setTempExpAmount] = useState('');

            const appId = 'ahorraya-v3-final';

            // 1. Inicialización de Firebase
            useEffect(() => {
                const init = async () => {
                    try {
                        if (!window.FB) return;
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, signInWithCustomToken } = window.FB;
                        
                        // Configuración inyectada o demo
                        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : { apiKey: "demo", authDomain: "demo", projectId: "demo" };
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);

                        if (window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        
                        onAuthStateChanged(auth, (u) => {
                            if(u) {
                                setUser(u);
                                setLoading(false);
                            }
                        });

                        // Forzar salida de carga si tarda demasiado
                        setTimeout(() => setLoading(false), 4000);

                    } catch (e) {
                        console.error("Error de inicio:", e);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            // 2. Escucha de Datos en Firestore (Nube)
            useEffect(() => {
                if (!user || !db) return;
                const { doc, onSnapshot, collection } = window.FB;

                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'main'), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setIncome(data.income || '');
                        setFixedExpenses(data.fixedExpenses || '');
                        setSavingsTarget(data.savingsTarget || '');
                    }
                });

                const unsubExpenses = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'expenses'), (snap) => {
                    const list = [];
                    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                    setExpensesList(list.sort((a,b) => b.timestamp - a.timestamp));
                });

                const unsubHabits = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'habits'), (snap) => {
                    const list = [];
                    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                    setHabitualProducts(list);
                });

                const unsubHistory = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), (snap) => {
                    const list = [];
                    let total = 0;
                    snap.forEach(d => {
                        const data = d.data();
                        list.push({ id: d.id, ...data });
                        total += (data.savingsAchieved || 0);
                    });
                    setHistoryList(list.sort((a,b) => b.timestamp - a.timestamp));
                    setTotalSavedOverall(total);
                });

                return () => { unsubSettings(); unsubExpenses(); unsubHabits(); unsubHistory(); };
            }, [user, db]);

            // Lógica de Negocio
            const incVal = parseFloat(income) || 0;
            const fixedVal = parseFloat(fixedExpenses) || 0;
            const savVal = parseFloat(savingsTarget) || 0;
            const spentVal = expensesList.reduce((acc, curr) => acc + curr.amount, 0);
            const weeklyRemaining = incVal - fixedVal - savVal - spentVal;
            const dailyLuxury = weeklyRemaining / 7;
            const isNegative = weeklyRemaining < 0;

            // Refrescar Iconos
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [view, expensesList, habitualProducts, historyList, loading]);

            const formatCurrency = (num) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(num);

            // Escala de fuente dinámica para evitar recortes
            const getDynamicFontSize = (value, baseSize, limit = 8) => {
                const length = value.toString().length;
                if (length <= limit) return baseSize;
                if (length <= limit + 3) return `${parseFloat(baseSize) * 0.75}rem`;
                if (length <= limit + 6) return `${parseFloat(baseSize) * 0.6}rem`;
                return `${parseFloat(baseSize) * 0.45}rem`;
            };

            const saveBaseSettings = async (i, f, s) => {
                if (!user || !db) return;
                await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'main'), { 
                    income: i, fixedExpenses: f, savingsTarget: s 
                });
            };

            const addExpense = async (name, amount) => {
                if (!user || !db || !name || !amount) return;
                await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'expenses'), {
                    name, amount: parseFloat(amount), timestamp: Date.now(),
                    date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                setTempExpName(''); setTempExpAmount('');
            };

            const confirmDelete = async () => {
                if (!user || !db) return;
                const pathMap = { 'expense': 'expenses', 'habit': 'habits', 'history': 'history' };
                await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'users', user.uid, pathMap[deleteDialog.type], deleteDialog.id));
                setDeleteDialog({ isOpen: false, type: null, id: null, title: '' });
            };

            const archiveWeek = async () => {
                if (!user || !db) return;
                const achieved = savVal + weeklyRemaining;
                await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'history'), {
                    dateRange: `Semana ${new Date().toLocaleDateString()}`,
                    savingsAchieved: achieved,
                    totalSpent: fixedVal + spentVal,
                    isPenalty: weeklyRemaining < 0,
                    timestamp: Date.now()
                });
                const snapshot = await window.FB.getDocs(window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'expenses'));
                await Promise.all(snapshot.docs.map(d => window.FB.deleteDoc(window.FB.doc(db, 'artifacts', appId, 'users', user.uid, 'expenses', d.id))));
                setShowConfirmArchive(false); setView('history');
            };

            if (loading) return (
                <div className="min-h-screen bg-[#1a1b1e] flex flex-col items-center justify-center text-white font-black">
                    <AhorraYALogo className="w-24 h-24 mb-6 animate-pulse" />
                    <span className="tracking-[0.5em] text-[12px] opacity-40 uppercase">AhorraYA</span>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 glass-header border-b border-white/20 px-6 safe-top pb-6 flex flex-col items-center shadow-2xl">
                        <div className="w-full max-w-md flex items-center justify-between">
                            <div className="flex items-center gap-2 -ml-3">
                                <div className="bg-white p-1.5 rounded-[1.2rem] shadow-2xl shrink-0"><AhorraYALogo className="w-9 h-9 text-[#1a1b1e]" /></div>
                                <h1 className="text-2xl font-black text-white tracking-tight leading-none">AhorraYA</h1>
                            </div>
                            <button onClick={() => setView('history')} className="flex items-center gap-2 border px-4 py-2.5 rounded-full bg-white/10 border-white/30 text-white shadow-xl shrink-0 active:scale-95 transition-all">
                                <Icon name="trending-up" className={`w-4 h-4 shrink-0 ${totalSavedOverall < 0 ? 'rotate-180 text-red-500' : 'text-white'}`} />
                                <span className="text-[12px] font-black tracking-tighter" style={{ fontSize: getDynamicFontSize(formatCurrency(totalSavedOverall), '0.75rem', 12) }}>{formatCurrency(totalSavedOverall)}</span>
                            </button>
                        </div>
                        <nav className="flex bg-black/80 p-1.5 rounded-[2.2rem] border border-white/10 w-full max-w-md mt-8 shadow-inner">
                            {[{id:'setup',i:'layout-dashboard',l:'BASE'}, {id:'habits',i:'repeat',l:'HÁBITOS'}, {id:'tracking',i:'plus-circle',l:'GASTOS'}, {id:'history',i:'history',l:'LOGROS'}].map(btn => (
                                <button key={btn.id} onClick={() => setView(btn.id)} className={`flex-1 flex flex-col items-center gap-1.5 py-4 rounded-[1.8rem] transition-all duration-300 ${view === btn.id ? 'bg-white text-black shadow-2xl scale-[1.02]' : 'text-slate-500 hover:text-white'}`}>
                                    <Icon name={btn.i} className="w-4 h-4" />
                                    <span className="text-[9px] font-black uppercase tracking-[0.12em]">{btn.l}</span>
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="w-full max-w-md mx-auto p-6 space-y-10 flex-1 overflow-y-auto pb-[260px]">
                        {view === 'setup' && (
                            <div className="space-y-8 animate-in">
                                <div className="bg-[#2a2b30] border border-white/20 p-8 rounded-[3.5rem] shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-3xl"></div>
                                    <h2 className="text-[12px] font-black text-white uppercase tracking-widest opacity-60 ml-2 relative z-10">Plan Semanal</h2>
                                    <div className="space-y-6 relative z-10">
                                        <div><label className="block text-[10px] font-bold text-slate-500 mb-2 ml-4 uppercase">Ingreso Semanal</label><input type="number" inputMode="decimal" value={income} onChange={e => { setIncome(e.target.value); saveBaseSettings(e.target.value, fixedExpenses, savingsTarget); }} className="w-full bg-black/60 border border-white/20 rounded-[2rem] py-5 px-7 outline-none text-3xl font-black text-white" placeholder="$ 0" /></div>
                                        <div className="grid grid-cols-2 gap-5">
                                            <div><label className="block text-[10px] font-bold text-slate-500 mb-2 ml-4 uppercase">Gastos Fijos</label><input type="number" inputMode="decimal" value={fixedExpenses} onChange={e => { setFixedExpenses(e.target.value); saveBaseSettings(income, e.target.value, savingsTarget); }} className="w-full bg-black/60 border border-white/20 rounded-[1.5rem] py-5 px-6 outline-none text-xl font-bold text-white" placeholder="0" /></div>
                                            <div><label className="block text-[10px] font-bold text-slate-500 mb-2 ml-4 uppercase">Meta Ahorro</label><input type="number" inputMode="decimal" value={savingsTarget} onChange={e => { setSavingsTarget(e.target.value); saveBaseSettings(income, fixedExpenses, e.target.value); }} className="w-full bg-black/60 border border-white/20 rounded-[1.5rem] py-5 px-6 outline-none text-xl font-bold text-white" placeholder="0" /></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-[#2a2b30] border border-white/20 p-8 rounded-[3.5rem] text-center shadow-2xl">
                                    <Icon name="calendar-days" className="w-8 h-8 text-white/20 mx-auto mb-4" />
                                    <button onClick={() => setShowConfirmArchive(true)} className="w-full bg-white text-black font-black py-6 rounded-[2rem] shadow-2xl active:scale-95 transition-all">
                                        <Icon name="refresh-cw" className="inline w-4 h-4 mr-2" /> COMENZAR SEMANA NUEVA
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'habits' && (
                            <div className="space-y-8 animate-in">
                                <form onSubmit={(e) => { e.preventDefault(); if(tempHabitName && tempHabitAmount) { window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'habits'), { name: tempHabitName, amount: parseFloat(tempHabitAmount) }); setTempHabitName(''); setTempHabitAmount(''); }}} className="bg-[#2a2b30] border border-white/20 p-8 rounded-[3.5rem] space-y-6 shadow-2xl">
                                    <h2 className="text-[11px] font-black text-white uppercase tracking-[0.3em] ml-2">Nuevo Atajo</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Concepto (ej. Café)" value={tempHabitName} onChange={e => setTempHabitName(e.target.value)} className="w-full bg-black/60 border border-white/20 rounded-[1.5rem] py-5 px-6 text-white outline-none" />
                                        <input type="number" inputMode="decimal" placeholder="Monto $" value={tempHabitAmount} onChange={e => setTempHabitAmount(e.target.value)} className="w-full bg-black/60 border border-white/20 rounded-[1.5rem] py-5 px-6 text-white outline-none" />
                                    </div>
                                    <button type="submit" className="w-full bg-white text-black font-black py-5 rounded-[2rem] active:scale-95 transition-transform">AGREGAR A LISTA</button>
                                </form>
                                <div className="grid grid-cols-2 gap-5">
                                    {habitualProducts.map(p => (
                                        <div key={p.id} className="relative group">
                                            <button onClick={() => addExpense(p.name, p.amount)} className="w-full bg-[#2a2b30] border border-white/15 p-7 rounded-[2.8rem] text-left h-48 flex flex-col justify-between overflow-hidden shadow-2xl active:scale-90 transition-all">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-3xl"></div>
                                                <div className="min-w-0 pr-2 z-10 relative"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 truncate">{p.name}</span><span className="font-black text-white tracking-tighter truncate block" style={{ fontSize: getDynamicFontSize(formatCurrency(p.amount).replace('MXN',''), '1.5rem', 6) }}>{formatCurrency(p.amount).replace('MXN','')}</span></div>
                                                <div className="text-[9px] font-black bg-white/20 text-white py-2.5 px-5 rounded-full w-fit z-10 relative font-bold">PAGAR</div>
                                            </button>
                                            <button onClick={() => setDeleteDialog({ isOpen: true, type: 'habit', id: p.id, title: p.name })} className="absolute top-4 right-4 text-slate-600 p-2 z-20"><Icon name="x" className="w-4 h-4" /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'tracking' && (
                            <div className="space-y-8 animate-in">
                                <form onSubmit={(e) => { e.preventDefault(); addExpense(tempExpName, tempExpAmount); }} className="bg-[#2a2b30] border border-white/20 p-8 rounded-[3.5rem] space-y-6 shadow-2xl">
                                    <h2 className="text-[11px] font-black text-white uppercase tracking-[0.3em] ml-2">Registro Manual</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="¿En qué gastaste?" value={tempExpName} onChange={e => setTempExpName(e.target.value)} className="w-full bg-black/60 border border-white/20 rounded-[1.5rem] py-5 px-6 text-white outline-none" />
                                        <input type="number" inputMode="decimal" placeholder="Monto $" value={tempExpAmount} onChange={e => setTempExpAmount(e.target.value)} className="w-full bg-black/60 border border-white/20 rounded-[1.5rem] py-5 px-6 text-white outline-none" />
                                    </div>
                                    <button type="submit" className="w-full bg-white text-black font-black py-5 rounded-[2rem] active:scale-95 transition-transform">REGISTRAR AHORA</button>
                                </form>
                                <div className="space-y-4 pt-4">
                                    <h3 className="text-[10px] font-black text-slate-700 uppercase tracking-[0.4em] ml-4 mb-2">Gastos de la Semana</h3>
                                    {expensesList.map(e => (
                                        <div key={e.id} className="flex justify-between items-center bg-[#2a2b30] border border-white/10 p-7 rounded-[2.2rem] shadow-xl animate-in">
                                            <div className="min-w-0 pr-4"><p className="font-black text-white text-lg tracking-tight truncate">{e.name}</p><p className="text-[10px] text-slate-600 uppercase mt-1 tracking-widest">{e.date}</p></div>
                                            <div className="flex items-center gap-6 shrink-0"><p className="font-black text-white tracking-tighter" style={{ fontSize: getDynamicFontSize(formatCurrency(e.amount).replace('MXN',''), '1.25rem', 7) }}>-{formatCurrency(e.amount).replace('MXN','')}</p><button onClick={() => setDeleteDialog({ isOpen: true, type: 'expense', id: e.id, title: e.name })} className="text-slate-700 p-2 active:text-red-500 transition-colors"><Icon name="trash-2" className="w-5 h-5"/></button></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-8 animate-in">
                                <div className={`p-10 rounded-[4rem] text-center shadow-2xl relative overflow-hidden transition-all duration-1000 ${totalSavedOverall >= 0 ? 'bg-black/80' : 'bg-red-950/40'}`}>
                                    <div className={`absolute top-0 right-0 w-60 h-60 rounded-full blur-[110px] opacity-10 ${totalSavedOverall >= 0 ? 'bg-white' : 'bg-red-500'}`}></div>
                                    <p className="text-[11px] font-black text-white uppercase tracking-[0.5em] mb-4 opacity-40">Ahorro Neto Acumulado</p>
                                    <h2 className="font-black text-white tracking-tighter break-all drop-shadow-2xl" style={{ fontSize: getDynamicFontSize(formatCurrency(totalSavedOverall), '4.5rem') }}>{formatCurrency(totalSavedOverall)}</h2>
                                    <div className={`mt-8 inline-flex items-center gap-3 px-6 py-2.5 rounded-full text-[12px] font-black border transition-all ${totalSavedOverall >= 0 ? 'bg-white/10 text-white border-white/30' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}><Icon name={totalSavedOverall >= 0 ? 'trending-up' : 'alert-circle'} className="w-4 h-4 shrink-0" />{totalSavedOverall >= 0 ? 'Sigues sumando' : 'Debes reajustar'}</div>
                                </div>
                                <div className="space-y-5">
                                    <h3 className="text-[10px] font-black text-slate-700 uppercase tracking-[0.4em] ml-4 mb-2">Semanas Archivadas</h3>
                                    {historyList.map(h => (
                                        <div key={h.id} className="bg-[#2a2b30] border border-white/15 p-7 rounded-[2.8rem] flex items-center justify-between shadow-2xl relative group">
                                            <div className="flex items-center gap-6 min-w-0 pr-4"><div className={`p-4 rounded-3xl border shrink-0 ${h.isPenalty ? 'bg-red-500/10 text-red-400 border-red-500/40' : 'bg-white/5 text-white border-white/30'}`}><Icon name={h.isPenalty ? 'alert-triangle' : 'check-circle-2'} className="w-7 h-7" /></div><div className="truncate"><p className="text-[13px] font-black text-white uppercase truncate">{h.dateRange}</p><p className="text-[11px] text-slate-500 font-bold mt-1">Gasto: {formatCurrency(h.totalSpent)}</p></div></div>
                                            <div className="flex items-center gap-4 shrink-0"><div className="text-right"><p className={`font-black tracking-tighter ${h.savingsAchieved >= 0 ? 'text-white' : 'text-red-400'}`} style={{ fontSize: getDynamicFontSize(formatCurrency(h.savingsAchieved).replace('MXN',''), '1.5rem', 7) }}>{h.savingsAchieved >= 0 ? '+' : ''}{formatCurrency(h.savingsAchieved).replace('MXN','')}</p></div><button onClick={() => setDeleteDialog({ isOpen: true, type: 'history', id: h.id, title: h.dateRange })} className="p-2 bg-red-500/10 rounded-xl text-red-500/50 active:scale-90 transition-all"><Icon name="trash-2" className="w-5 h-5" /></button></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <section className={`fixed bottom-0 left-0 w-full px-6 safe-bottom transition-all duration-1000 z-50 ${income !== '0' && income !== '' ? 'translate-y-0 opacity-100' : 'translate-y-48 opacity-0'}`}>
                        <div className={`p-8 rounded-[4rem] shadow-[0_-30px_90px_-15px_rgba(0,0,0,1)] border border-white/20 backdrop-blur-3xl max-w-md mx-auto relative overflow-hidden ${isNegative ? 'bg-red-950/98' : 'bg-[#121317]/98'}`}>
                            <div className="flex items-center justify-between relative z-10">
                                <div className="flex-1 min-w-0 pr-4">
                                    <p className={`text-[11px] font-black uppercase tracking-[0.3em] mb-2.5 ${isNegative ? 'text-red-500' : 'text-white opacity-40'}`}>{isNegative ? 'Límite Excedido' : 'Presupuesto Diario'}</p>
                                    <div className="flex items-baseline gap-3 flex-wrap">
                                        <h2 className="font-black text-white tracking-tighter break-all transition-all duration-300" style={{ fontSize: getDynamicFontSize(formatCurrency(isNegative ? Math.abs(weeklyRemaining) : dailyLuxury).replace('MXN',''), '3rem') }}>{formatCurrency(isNegative ? Math.abs(weeklyRemaining) : dailyLuxury).replace('MXN','')}</h2>
                                        <span className="text-[10px] font-black opacity-20 text-white tracking-[0.2em] uppercase shrink-0">/ {formatCurrency(weeklyRemaining).replace('MXN','')}</span>
                                    </div>
                                </div>
                                <button onClick={() => setView('tracking')} className={`p-6 rounded-[2.2rem] transition-all active:scale-90 border shadow-2xl shrink-0 ${isNegative ? 'bg-red-600 border-red-500 text-white shadow-red-900/50' : 'bg-white border-white text-black shadow-white/20'}`}><Icon name="shopping-bag" className="w-9 h-9" /></button>
                            </div>
                            <div className="w-full h-3 bg-white/10 rounded-full mt-7 overflow-hidden relative border border-white/5"><div className={`h-full transition-all duration-1000 ${isNegative ? 'bg-red-600 w-full shadow-[0_0_20px_rgba(220,38,38,0.8)]' : 'bg-white shadow-[0_0_20px_rgba(255,255,255,0.5)]'}`} style={{ width: isNegative ? '100%' : `${Math.min((dailyLuxury / (incVal/7 || 1)) * 100, 100)}%` }}></div></div>
                        </div>
                    </section>

                    {/* Modales de Verificación */}
                    {showConfirmArchive && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-6 bg-black/90 backdrop-blur-md animate-in fade-in duration-300"><div className="bg-[#2a2b30] border border-white/20 p-8 rounded-[3.5rem] w-full max-w-sm shadow-2xl text-center space-y-6 zoom-in-95 duration-300"><AhorraYALogo className="w-12 h-12 mx-auto text-white" /><h3 className="text-xl font-black text-white">¿Archivar Semana?</h3><p className="text-sm text-slate-400">Los gastos actuales se borrarán y el balance se guardará permanentemente en la nube vinculada a tu teléfono.</p><div className="flex gap-4 pt-2"><button onClick={() => setShowConfirmArchive(false)} className="flex-1 py-4 bg-white/10 text-white rounded-2xl font-bold active:scale-95">VOLVER</button><button onClick={archiveWeek} className="flex-[2] py-4 bg-white text-black rounded-2xl font-black shadow-xl active:scale-95">SÍ, ARCHIVAR</button></div></div></div>
                    )}
                    {deleteDialog.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-6 bg-black/90 backdrop-blur-md animate-in fade-in duration-300"><div className="bg-[#2a2b30] border border-red-500/20 p-8 rounded-[3.5rem] w-full max-w-sm shadow-2xl text-center space-y-6 zoom-in-95 duration-300"><Icon name="alert-triangle" className="w-12 h-12 mx-auto text-red-500" /><h3 className="text-xl font-black text-white uppercase tracking-tight">¿Eliminar {deleteDialog.type === 'expense' ? 'Gasto' : deleteDialog.type === 'habit' ? 'Hábito' : 'Semana'}?</h3><p className="text-sm text-slate-400">Estás por borrar permanentemente: <span className="text-white font-bold">"{deleteDialog.title}"</span>. Esta acción no se puede deshacer.</p><div className="flex gap-4 pt-2"><button onClick={() => setDeleteDialog({ isOpen: false, type: null, id: null, title: '' })} className="flex-1 py-4 bg-white/10 text-white rounded-2xl font-bold active:scale-95">CANCELAR</button><button onClick={confirmDelete} className="flex-[2] py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg active:scale-95">SÍ, ELIMINAR</button></div></div></div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
